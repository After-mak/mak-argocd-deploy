name: Custom Tag Rollback Workflow

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Target tag to rollback'
        required: false
        default: 'v1.0.0'

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Custom Rollback
        run: |
          echo "🚀 Target Tag: ${{ github.event.inputs.target_tag }} 버전으로 롤백 진행"