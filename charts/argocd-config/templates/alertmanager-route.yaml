apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager-route
  namespace: prometheus
spec:
  parentRefs:
    - name: my-gateway
      namespace: default
  hostnames:
    - "alertmanager.tuby.shop"
  rules:
    - backendRefs:
        - name: prometheus-stack-kube-prom-alertmanager
          port: 9093
