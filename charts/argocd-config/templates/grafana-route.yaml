apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: prometheus
spec:
  parentRefs:
    - name: my-gateway
      namespace: default
  hostnames:
    - "grafana.tuby.shop"
  rules:
    - backendRefs:
        - name: prometheus-stack-grafana
          port: 80
