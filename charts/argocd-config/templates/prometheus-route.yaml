apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus-route
  namespace: prometheus
spec:
  parentRefs:
    - name: my-gateway
      namespace: default
  hostnames:
    - "prometheus.tuby.shop"
  rules:
    - backendRefs:
        - name: prometheus-stack-kube-prom-prometheus
          port: 9090
