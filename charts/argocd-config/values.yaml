gatewayName: "my-gateway"
gatewayNamespace: "default"

httpRoutes:
  - name: argocd-route
    namespace: argocd
    hostname: "argocd.tuby.shop"
    serviceName: "argocd-server"
    port: 80
  - name: grafana-route
    namespace: prometheus
    hostname: "grafana.tuby.shop"
    serviceName: "prometheus-stack-grafana"
    port: 80
  - name: prometheus-route
    namespace: prometheus
    hostname: "prometheus.tuby.shop"
    serviceName: "prometheus-stack-kube-prom-prometheus"
    port: 9090
  - name: alertmanager-route
    namespace: prometheus
    hostname: "alertmanager.tuby.shop"
    serviceName: "prometheus-stack-kube-prom-alertmanager"
    port: 9093
