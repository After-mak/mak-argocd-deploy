apiVersion: v1
kind: ConfigMap
metadata:
  name: accounts-db-init-script
  namespace: {{ .Release.Namespace | default "default" }}
data:
  init.sql: |
    -- Create users table
    CREATE TABLE IF NOT EXISTS users (
        user_id VARCHAR(32) PRIMARY KEY,
        username VARCHAR(32) UNIQUE NOT NULL,
        passhash VARCHAR(256) NOT NULL,
        firstname VARCHAR(32) NOT NULL,
        lastname VARCHAR(32) NOT NULL,
        email VARCHAR(64) NOT NULL,
        birthday DATE NOT NULL,
        street_address VARCHAR(64) NOT NULL,
        zip_code VARCHAR(10) NOT NULL,
        state VARCHAR(32) NOT NULL,
        ssn VARCHAR(11) NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create accounts table
    CREATE TABLE IF NOT EXISTS accounts (
        account_id VARCHAR(10) PRIMARY KEY,
        user_id VARCHAR(32) REFERENCES users(user_id) ON DELETE CASCADE,
        account_type VARCHAR(16) NOT NULL,
        routing_number VARCHAR(9) NOT NULL,
        balance INT NOT NULL DEFAULT 0,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Insert demo users (password: 'password123' hashed or demo users)
    INSERT INTO users (user_id, username, passhash, firstname, lastname, email, birthday, street_address, zip_code, state, ssn)
    VALUES 
    ('1000000000', 'testuser', '$2b$12$e/91.N4mE/cM8j.W3wH07e3W.yP1kE5lQ8gG3Kz8L2A7m6M8A9bC6', 'Test', 'User', 'testuser@example.com', '1990-01-01', '123 Main St', '12345', 'CA', '000-00-0000')
    ON CONFLICT (user_id) DO NOTHING;

    INSERT INTO accounts (account_id, user_id, account_type, routing_number, balance)
    VALUES 
    ('1234567890', '1000000000', 'CHECKING', '123456789', 100000)
    ON CONFLICT (account_id) DO NOTHING;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-db
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    app: accounts-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts-db
  template:
    metadata:
      labels:
        app: accounts-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "password"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: accounts-db-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: accounts-db
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  type: ClusterIP
  selector:
    app: accounts-db
  ports:
    - port: 5432
      targetPort: 5432