apiVersion: v1
kind: ConfigMap
metadata:
  name: accounts-db-init-script
  namespace: {{ .Release.Namespace | default "default" }}
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        username VARCHAR(64) PRIMARY KEY,
        password VARCHAR(128) NOT NULL,
        firstname VARCHAR(64) NOT NULL,
        lastname VARCHAR(64) NOT NULL,
        email VARCHAR(128) NOT NULL,
        birthday VARCHAR(10) NOT NULL,
        address VARCHAR(128) NOT NULL,
        state VARCHAR(2) NOT NULL,
        zip VARCHAR(5) NOT NULL,
        ssn VARCHAR(11) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS accounts (
        account_id VARCHAR(10) PRIMARY KEY,
        user_id VARCHAR(64) REFERENCES users(username),
        account_type VARCHAR(10) NOT NULL,
        balance INT NOT NULL
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-db
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    app: accounts-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts-db
  template:
    metadata:
      labels:
        app: accounts-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "password"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: accounts-db-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: accounts-db
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  type: ClusterIP
  selector:
    app: accounts-db
  ports:
    - port: 5432
      targetPort: 5432