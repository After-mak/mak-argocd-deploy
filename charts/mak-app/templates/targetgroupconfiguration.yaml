apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: mak-app-active-tg-config
  namespace: default
spec:
  targetReference:
    group: ""
    kind: Service
    name: mak-app-active
  defaultConfiguration:
    targetType: ip           
    protocol: HTTP
    protocolVersion: HTTP1\
    healthCheck:                 # 헬스 체크 포트 및 경로 명시
      enabled: true
      intervalSeconds: 15
      timeoutSeconds: 5
      healthyThresholdCount: 2
      unhealthyThresholdCount: 2
      port: "8080"
      path: "/"
      protocol: HTTP
---
