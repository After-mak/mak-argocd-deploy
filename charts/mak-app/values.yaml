# 기본 애플리케이션 설정
replicaCount: 3
image:
  repository: 372666940978.dkr.ecr.ap-northeast-2.amazonaws.com/sample-fastapi
  tag: "v0.1.0"
  pullPolicy: IfNotPresent
# 💡 패턴 분석 결과에 따라 깃허브 액션이 변경할 자원 권장값 영역
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
service:
  type: ClusterIP
  port: 80
# KEDA 및 애플리케이션 연동용 Redis 정보
redis:
  password: "redis"
