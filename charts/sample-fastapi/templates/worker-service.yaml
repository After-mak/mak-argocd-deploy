apiVersion: v1
kind: Service
metadata:
  name: sample-worker-metrics
  labels:
    {{- include "sample-fastapi.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sample-fastapi
    app.kubernetes.io/component: worker
  ports:
    - name: metrics
      port: {{ .Values.worker.metricsPort }}
      targetPort: metrics
