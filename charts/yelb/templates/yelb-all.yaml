# --------------------------------------------------
# 1. Gateway 리소스 (AWS ALB 생성 및 SSL/도메인 처리)
# --------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: yelb-gateway
  namespace: yelb
  annotations:
    # ALB Target Type을 IP 모드로 설정 (NodePort 30000~32767 없이 Pod IP로 직접 전달)
    alb.ingress.kubernetes.io/target-type: "ip"
    # ExternalDNS 연동 (tuby.shop Route53 레코드 자동 생성)
    external-dns.alpha.kubernetes.io/hostname: "tuby.shop"
spec:
  gatewayClassName: aws-alb  # 클러스터의 AWS Load Balancer Controller GatewayClass 이름
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "tuby.shop"
    tls:
      mode: Terminate
      certificateRefs:
      - name: "arn:aws:acm:ap-northeast-2:372666940978:certificate/26fc326a-e04d-40df-b0af-8f678f421f7a" # 실제 ACM ARN 입력
---
# --------------------------------------------------
# 2. HTTPRoute 리소스 (tuby.shop/ 요청 -> yelb-ui:80)
# --------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: yelb-ui-route
  namespace: yelb
spec:
  parentRefs:
  - name: yelb-gateway
  hostnames:
  - "tuby.shop"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: yelb-ui
      port: 80
---
# --------------------------------------------------
# 3. Services (모두 ClusterIP로 변경!)
# --------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: yelb-ui
  namespace: yelb
  labels:
    app: yelb-ui
    tier: frontend
spec:
  type: ClusterIP  # 💡 LoadBalancer에서 ClusterIP로 변경
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: yelb-ui
    tier: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: redis-server
  namespace: yelb
  labels:
    app: redis-server
    tier: cache
spec:
  type: ClusterIP
  ports:
  - port: 6379
  selector:
    app: redis-server
    tier: cache
---
apiVersion: v1
kind: Service
metadata:
  name: yelb-db
  namespace: yelb
  labels:
    app: yelb-db
    tier: backenddb
spec:
  type: ClusterIP
  ports:
  - port: 5432
  selector:
    app: yelb-db
    tier: backenddb
---
apiVersion: v1
kind: Service
metadata:
  name: yelb-appserver
  namespace: yelb
  labels:
    app: yelb-appserver
    tier: middletier
spec:
  type: ClusterIP
  ports:
  - port: 4567
  selector:
    app: yelb-appserver
    tier: middletier
---
# --------------------------------------------------
# 4. Deployments (기존과 동일)
# --------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yelb-ui
  namespace: yelb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yelb-ui
      tier: frontend
  template:
    metadata:
      labels:
        app: yelb-ui
        tier: frontend
    spec:
      containers:
      - name: yelb-ui
        image: mreferre/yelb-ui:0.10
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-server
  namespace: yelb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-server
      tier: cache
  template:
    metadata:
      labels:
        app: redis-server
        tier: cache
    spec:
      containers:
      - name: redis-server
        image: redis:4.0.2
        ports:
        - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yelb-db
  namespace: yelb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yelb-db
      tier: backenddb
  template:
    metadata:
      labels:
        app: yelb-db
        tier: backenddb
    spec:
      containers:
      - name: yelb-db
        image: mreferre/yelb-db:0.6
        ports:
        - containerPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yelb-appserver
  namespace: yelb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yelb-appserver
      tier: middletier
  template:
    metadata:
      labels:
        app: yelb-appserver
        tier: middletier
    spec:
      containers:
      - name: yelb-appserver
        image: mreferre/yelb-appserver:0.7
        ports:
        - containerPort: 4567